<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - GEHS Mehani</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --glass-bg: rgba(15, 23, 42, 0.85); --glass-border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: white; min-height: 100vh; overflow-x: hidden; }
        
        .sidebar { height: 100vh; width: 260px; background: var(--glass-bg); border-right: 1px solid var(--glass-border); position: fixed; z-index: 100; padding: 30px 0; transition: 0.3s; }
        .sidebar .brand { text-align: center; margin-bottom: 30px; }
        .nav-item { padding: 15px 30px; color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 15px; }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(59,130,246,0.2); border-left: 4px solid var(--accent); }
        .main-content { margin-left: 260px; padding: 30px; }
        
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; margin-bottom: 25px; }
        
        /* FORM INPUT FIXES */
        .form-control { background: rgba(0,0,0,0.3) !important; border: 1px solid var(--glass-border) !important; color: white !important; }
        .form-control::placeholder { color: #94a3b8 !important; }
        
        /* IMAGE STYLING */
        .gallery-img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 15px;}
        .img-caption { color: #cbd5e1; font-weight: 600; text-align: center; }

        .mobile-toggle { display: none; background: transparent; border: 1px solid var(--glass-border); color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 15px; }
            .mobile-toggle { display: inline-block; }
            .gallery-img { height: 200px; }
        }

        .requires-edit { display: none; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="brand">
            <i class="fa-solid fa-school fa-2x text-primary mb-2"></i>
            <h5 class="fw-bold text-white">GEHS Mehani</h5>
        </div>
        <a href="index.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a href="attendance.html" class="nav-item"><i class="fa-solid fa-clipboard-user"></i> Attendance</a>
        <a href="homework.html" class="nav-item"><i class="fa-solid fa-book-open"></i> Homework</a>
        <a href="gallery.html" class="nav-item active"><i class="fa-solid fa-photo-film"></i> Gallery</a>
        <a href="#" class="nav-item text-danger mt-5" onclick="logout()"><i class="fa-solid fa-power-off"></i> Logout</a>
    </div>

    <div class="main-content">
        <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i> Menu</button>
        <h2 class="mb-4 text-white">School Gallery</h2>

        <div class="glass-card requires-edit">
            <h5 class="text-info mb-3">Upload Media</h5>
            <form id="galleryForm" onsubmit="uploadPhoto(event)">
                <div class="row g-3">
                    <div class="col-md-5">
                        <input type="file" class="form-control" id="photo-file" accept="image/*" required>
                    </div>
                    <div class="col-md-5">
                        <input type="text" class="form-control" id="photo-caption" placeholder="Caption (e.g., Annual Function)" required>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-success w-100">Upload</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="row g-4" id="galleryContainer"></div>
    </div>

    <script>
        // CRITICAL FIX: currentRole must be declared OUTSIDE the onload function so everything can see it
        let currentRole = localStorage.getItem('school_role');
         
        window.onload = () => {
            // STRICT SECURITY KICKOUT
            if (!currentRole) { 
                window.location.href = 'index.html'; 
                return; 
            } 
            
            // Apply Permissions... Show upload form only to HM and Teacher
            if (currentRole === 'hm' || currentRole === 'teacher') {
                document.querySelectorAll('.requires-edit').forEach(el => el.style.display = 'block');
            }
            
            // CRITICAL FIX: This commands the page to draw the images from memory immediately
            loadGallery();
        }; 

        function logout() { localStorage.removeItem('school_role'); window.location.href = 'index.html'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }

        function uploadPhoto(e) {
            e.preventDefault();
            const file = document.getElementById('photo-file').files[0];
            const caption = document.getElementById('photo-caption').value;
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    let photos = JSON.parse(localStorage.getItem('sys_photos')) || [];
                    photos.unshift({ id: Date.now(), img: event.target.result, cap: caption });
                    try {
                        localStorage.setItem('sys_photos', JSON.stringify(photos));
                        document.getElementById('galleryForm').reset();
                        loadGallery();
                    } catch (err) { alert("File too large for LocalStorage simulation! Try a smaller image file."); }
                };
                reader.readAsDataURL(file);
            }
        }

        function deletePhoto(id) {
            let photos = JSON.parse(localStorage.getItem('sys_photos')) || [];
            localStorage.setItem('sys_photos', JSON.stringify(photos.filter(p => p.id !== id)));
            loadGallery();
        }

        function loadGallery() {
            let photos = JSON.parse(localStorage.getItem('sys_photos')) || [];
            const container = document.getElementById('galleryContainer');
            
            // If no photos exist, show a placeholder message
            if (photos.length === 0) {
                container.innerHTML = '<div class="col-12 text-center text-muted p-5">No photos uploaded yet.</div>';
                return;
            }

            // Draw the photos
            container.innerHTML = photos.map(photo => `
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="glass-card p-3 position-relative text-center h-100">
                        ${currentRole === 'hm' ? `<button class="btn btn-sm btn-danger position-absolute top-0 end-0 m-2" onclick="deletePhoto(${photo.id})"><i class="fa-solid fa-trash"></i></button>` : ''}
                        <img src="${photo.img}" class="gallery-img">
                        <p class="img-caption m-0">${photo.cap}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
