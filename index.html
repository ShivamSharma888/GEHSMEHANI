<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEHS Mehani - Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --text-main: #f8fafc; --glass-bg: rgba(15, 23, 42, 0.85); --glass-border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: var(--text-main); overflow-x: hidden; min-height: 100vh; }
        
        /* LOGIN SCREEN */
        #login-screen { position: fixed; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; z-index: 1000; background-color: var(--primary); }
        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .login-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; z-index: 1; text-align: center; }
        
        /* FORM INPUTS */
        .form-control { background: rgba(0,0,0,0.3) !important; border: 1px solid var(--glass-border) !important; color: white !important; padding: 12px; }
        .form-control::placeholder { color: #94a3b8 !important; }
        .form-control:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 0.25rem rgba(59,130,246,0.5) !important; }
        .btn-login { background: var(--accent); color: white; padding: 12px; border-radius: 8px; width: 100%; font-weight: 600; border: none; transition: 0.3s; }
        .btn-login:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59,130,246,0.4); }
        
        /* ERROR MESSAGE */
        #login-error { display: none; color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9rem; }

        /* LAYOUT & SIDEBAR */
        #app-layout { display: none; }
        .sidebar { height: 100vh; width: 260px; background: var(--glass-bg); border-right: 1px solid var(--glass-border); position: fixed; z-index: 100; padding: 30px 0; transition: 0.3s; }
        .sidebar .brand { text-align: center; margin-bottom: 30px; }
        .nav-item { padding: 15px 30px; color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(59,130,246,0.2); border-left: 4px solid var(--accent); }
        .main-content { margin-left: 260px; padding: 30px; }
        
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); }

        .mobile-toggle { display: none; background: transparent; border: 1px solid var(--glass-border); color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .sidebar.show { transform: translateX(0); } .main-content { margin-left: 0; padding: 15px; } .mobile-toggle { display: inline-block; } }
        .requires-edit { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <canvas id="particle-canvas"></canvas>
        <div class="login-card">
            <i class="fa-solid fa-graduation-cap fa-3x text-primary mb-3" style="color: #3b82f6 !important;"></i>
            <h3 class="fw-bold mb-4 text-white">GEHS Mehani</h3>
            
            <div id="login-error"><i class="fa-solid fa-triangle-exclamation"></i> Invalid username or password.</div>

            <form onsubmit="authenticateUser(event)">
                <div class="mb-3 text-start">
                    <label class="text-muted small ms-1 mb-1">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="e.g., student12" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="text-muted small ms-1 mb-1">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-login">Secure Login <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i></button>
            </form>
        </div>
    </div>

    <div id="app-layout">
        <div class="sidebar" id="sidebar">
            <div class="brand">
                <i class="fa-solid fa-school fa-2x text-primary mb-2"></i>
                <h5 class="fw-bold text-white">GEHS Mehani</h5>
                <span id="role-badge" class="badge bg-primary rounded-pill mt-2">ROLE</span>
                <div class="mt-2 small text-muted">User: <span id="user-display"></span></div>
            </div>
            <a href="index.html" class="nav-item active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a href="attendance.html" class="nav-item"><i class="fa-solid fa-clipboard-user"></i> Attendance</a>
            <a href="homework.html" class="nav-item"><i class="fa-solid fa-book-open"></i> Homework</a>
            <a href="gallery.html" class="nav-item"><i class="fa-solid fa-photo-film"></i> Gallery</a>
            <a href="#" class="nav-item text-danger mt-5" onclick="logout()"><i class="fa-solid fa-power-off"></i> Logout</a>
        </div>

        <div class="main-content">
            <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i> Menu</button>
            
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                <h2 class="text-white">Analytics</h2>
                <a href="https://meet.google.com/new" target="_blank" class="btn btn-primary requires-edit"><i class="fa-solid fa-video"></i> Start Virtual Class</a>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="glass-card text-center border-top border-primary border-3">
                        <h6 class="text-muted">Total Students Enrolled</h6>
                        <h2 class="fw-bold mt-2 text-white">57</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card text-center border-top border-success border-3">
                        <h6 class="text-muted">Today's Attendance</h6>
                        <h2 class="fw-bold mt-2 text-white">94%</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card text-center border-top border-warning border-3">
                        <h6 class="text-muted">Active Teaching Staff</h6>
                        <h2 class="fw-bold mt-2 text-white">9</h2>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-8">
                    <div class="glass-card">
                        <h5 class="mb-4 text-white">Attendance Trends</h5>
                        <canvas id="attendanceChart" height="100"></canvas>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card">
                        <h5 class="mb-4 text-white">Demographics</h5>
                        <canvas id="gradeChart" height="220"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check Auth State on Load
        let currentRole = localStorage.getItem('school_role');
        let currentUser = localStorage.getItem('school_user');
        
        window.onload = () => {
            if (currentRole) {
                // If logged in, skip login screen
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-layout').style.display = 'block';
                setupUI();
                initCharts();
            } else {
                initParticles(); // Run particles only on login screen
            }
        };

        // --- AUTHENTICATION ENGINE ---
        function authenticateUser(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('login-error');
            
            let assignedRole = null;

            // 1. Check for Headmaster
            if (user === 'hm_admin' && pass === 'adminpassword') {
                assignedRole = 'hm';
            } 
            // 2. Check for Teachers (teacher1 through teacher9)
            else if (user.startsWith('teacher') && pass === 'teachpass') {
                let num = parseInt(user.replace('teacher', ''));
                if (num >= 1 && num <= 9) assignedRole = 'teacher';
            }
            // 3. Check for Students (student1 through student57)
            else if (user.startsWith('student') && pass === 'studentpass') {
                let num = parseInt(user.replace('student', ''));
                if (num >= 1 && num <= 57) assignedRole = 'student';
            }

            // Execute Login or Show Error
            if (assignedRole) {
                localStorage.setItem('school_role', assignedRole);
                localStorage.setItem('school_user', user); // Save their specific username
                window.location.reload();
            } else {
                errorMsg.style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('school_role');
            localStorage.removeItem('school_user');
            window.location.reload();
        }

        function setupUI() {
            const badge = document.getElementById('role-badge');
            badge.innerText = currentRole.toUpperCase();
            badge.className = `badge rounded-pill mt-2 ${currentRole === 'hm' ? 'bg-danger' : currentRole === 'teacher' ? 'bg-info text-dark' : 'bg-success'}`;
            
            document.getElementById('user-display').innerText = currentUser;

            if(currentRole === 'hm' || currentRole === 'teacher') {
                document.querySelectorAll('.requires-edit').forEach(el => el.style.display = 'inline-block');
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }

        // Charts
        function initCharts() {
            const ctxAtt = document.getElementById('attendanceChart').getContext('2d');
            new Chart(ctxAtt, {
                type: 'line',
                data: { labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'], datasets: [{ label: 'Rate %', data: [85, 88, 92, 90, 95], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.2)', fill: true }] },
                options: { color: '#fff', scales: { y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: {color: '#fff'} }, x: { ticks: {color: '#fff'} } }, plugins: {legend: {display: false}} }
            });
            const ctxGrade = document.getElementById('gradeChart').getContext('2d');
            new Chart(ctxGrade, {
                type: 'doughnut',
                data: { labels: ['A', 'B', 'C'], datasets: [{ data: [45, 35, 20], backgroundColor: ['#10b981', '#3b82f6', '#f59e0b'], borderWidth: 0 }] },
                options: { color: '#fff', plugins: { legend: { labels: {color: '#fff'} } } }
            });
        }

        // Particle Background
        function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let pArray = Array.from({length: 50}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, dx: Math.random()-0.5, dy: Math.random()-0.5}));
            function animate() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                pArray.forEach(p => { p.x+=p.dx; p.y+=p.dy; if(p.x<0||p.x>canvas.width)p.dx*=-1; if(p.y<0||p.y>canvas.height)p.dy*=-1;
                    ctx.fillStyle='rgba(59,130,246,0.5)'; ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
