<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework - GEHS Mehani</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* === CORE PREMIUM THEME === */
        :root { --primary: #0f172a; --accent: #3b82f6; --glass-bg: rgba(15, 23, 42, 0.85); --glass-border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: white; min-height: 100vh; overflow-x: hidden; }
        
        /* SIDEBAR */
        .sidebar { height: 100vh; width: 260px; background: var(--glass-bg); border-right: 1px solid var(--glass-border); position: fixed; z-index: 100; padding: 30px 0; transition: 0.3s; }
        .sidebar .brand { text-align: center; margin-bottom: 30px; }
        .nav-item { padding: 15px 30px; color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 15px; transition: 0.2s;}
        .nav-item:hover, .nav-item.active { color: white; background: rgba(59,130,246,0.2); border-left: 4px solid var(--accent); }
        
        /* MAIN CONTENT & CARDS */
        .main-content { margin-left: 260px; padding: 30px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; margin-bottom: 25px; }
        .hw-card { background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); border-left: 4px solid var(--accent); border-radius: 8px; padding: 20px; transition: 0.2s; }
        .hw-card:hover { background: rgba(0, 0, 0, 0.4); transform: translateY(-3px); }
        
        /* FORMS */
        .form-control, .form-select { background: rgba(0,0,0,0.3) !important; border: 1px solid var(--glass-border) !important; color: white !important; }
        .form-control::placeholder { color: #94a3b8 !important; }
        .form-control:focus, .form-select:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 0.25rem rgba(59,130,246,0.5) !important; }
        option { background: var(--primary); color: white; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        /* RESPONSIVE & UTILITY */
        .mobile-toggle { display: none; background: transparent; border: 1px solid var(--glass-border); color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .sidebar.show { transform: translateX(0); } .main-content { margin-left: 0; padding: 15px; } .mobile-toggle { display: inline-block; } }
        
        /* PERMISSIONS */
        .requires-teacher { display: none; } /* Only shown to Teacher */
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="brand">
            <i class="fa-solid fa-school fa-2x text-primary mb-2"></i>
            <h5 class="fw-bold text-white">GEHS Mehani</h5>
        </div>
        <a href="index.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a href="attendance.html" class="nav-item"><i class="fa-solid fa-clipboard-user"></i> Attendance</a>
        <a href="HOMEWORK.HTML" class="nav-item active"><i class="fa-solid fa-book-open"></i> Homework</a>
        <a href="gallery.html" class="nav-item"><i class="fa-solid fa-photo-film"></i> Gallery</a>
        <a href="#" class="nav-item text-danger mt-5" onclick="logout()"><i class="fa-solid fa-power-off"></i> Logout</a>
    </div>

    <div class="main-content">
        <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i> Menu</button>
        <h2 class="mb-4 text-white">Academic Homework</h2>

        <div class="glass-card requires-teacher">
            <h5 class="text-info mb-4"><i class="fa-solid fa-upload"></i> Assign Daily Homework</h5>
            <form onsubmit="postHomework(event)">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="text-muted small mb-1">Class</label>
                        <select class="form-select" id="hw-class" required>
                            <option value="">Select...</option>
                            <option value="6th">Class 6th</option>
                            <option value="7th">Class 7th</option>
                            <option value="8th">Class 8th</option>
                            <option value="9th">Class 9th</option>
                            <option value="10th">Class 10th</option>
                        </select>
                    </div>
                    <div class="col-md-5">
                        <label class="text-muted small mb-1">Subject / Topic</label>
                        <input type="text" class="form-control" id="hw-subject" placeholder="e.g., Mathematics - Algebra" required>
                    </div>
                    <div class="col-md-4">
                        <label class="text-muted small mb-1">Due Date</label>
                        <input type="date" class="form-control" id="hw-due" required>
                    </div>
                    <div class="col-12">
                        <label class="text-muted small mb-1">Homework Instructions</label>
                        <textarea class="form-control" id="hw-desc" rows="3" placeholder="Describe the homework tasks here..." required></textarea>
                    </div>
                    <div class="col-md-9">
                        <label class="text-muted small mb-1">Attach Worksheet/Image (Optional)</label>
                        <input type="file" class="form-control" id="hw-file">
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-paper-plane"></i> Post Homework</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="glass-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="m-0 text-white"><i class="fa-solid fa-list-check"></i> Current Assignments</h5>
                
                <select class="form-select form-select-sm w-auto" id="filter-class" onchange="loadHomework()">
                    <option value="all">View All Classes</option>
                    <option value="6th">Class 6th</option>
                    <option value="7th">Class 7th</option>
                    <option value="8th">Class 8th</option>
                    <option value="9th">Class 9th</option>
                    <option value="10th">Class 10th</option>
                </select>
            </div>

            <div id="homeworkFeed" class="d-grid gap-3">
                </div>
        </div>
    </div>

    <script>
        let currentRole = localStorage.getItem('school_role');

        window.onload = () => {
            let currentRole = localStorage.getItem('school_role');
            
            // STRICT SECURITY KICKOUT
            if (!currentRole) { 
                window.location.href = 'index.html'; 
                return; // Stop running code
            } 
            
            // Apply Permissions...
            if (currentRole === 'hm' || currentRole === 'teacher') {
                document.querySelectorAll('.requires-edit').forEach(el => el.style.display = 'block');
            }
            // ... (rest of your onload logic for that specific page)
        
            
            // Set default due date to tomorrow
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('hw-due').value = tomorrow.toISOString().split('T')[0];

            loadHomework();
        };

        function logout() { localStorage.removeItem('school_role'); window.location.href = 'index.html'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }

        // --- POST HOMEWORK ---
        function postHomework(e) {
            e.preventDefault();
            
            const fileInput = document.getElementById('hw-file');
            const today = new Date().toLocaleDateString();
            
            const newHw = {
                id: Date.now(),
                dateAssigned: today,
                className: document.getElementById('hw-class').value,
                subject: document.getElementById('hw-subject').value,
                dueDate: document.getElementById('hw-due').value,
                desc: document.getElementById('hw-desc').value,
                fileName: fileInput.files.length > 0 ? fileInput.files[0].name : null,
                fileData: null
            };

            // Handle optional file attachment
            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    newHw.fileData = event.target.result;
                    saveAndReload(newHw, e.target);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                saveAndReload(newHw, e.target);
            }
        }

        function saveAndReload(hwData, formElement) {
            let homeworkData = JSON.parse(localStorage.getItem('sys_hw')) || [];
            homeworkData.unshift(hwData); // Add to top of list
            
            try {
                localStorage.setItem('sys_hw', JSON.stringify(homeworkData));
                formElement.reset(); // Clear form
                loadHomework();
                alert("Homework Posted Successfully!");
            } catch (error) {
                alert("Error: Attachment too large for local prototype storage.");
            }
        }

        // --- DELETE HOMEWORK (Teacher can delete their own mistakes) ---
        function deleteHomework(id) {
            if (confirm("Are you sure you want to delete this assignment?")) {
                let homeworkData = JSON.parse(localStorage.getItem('sys_hw')) || [];
                localStorage.setItem('sys_hw', JSON.stringify(homeworkData.filter(hw => hw.id !== id)));
                loadHomework();
            }
        }

        // --- RENDER FEED ---
        function loadHomework() {
            let homeworkData = JSON.parse(localStorage.getItem('sys_hw')) || [];
            const feed = document.getElementById('homeworkFeed');
            const filter = document.getElementById('filter-class').value;

            feed.innerHTML = '';

            // Apply Filter
            if (filter !== 'all') {
                homeworkData = homeworkData.filter(hw => hw.className === filter);
            }

            if(homeworkData.length === 0) {
                feed.innerHTML = '<div class="text-center p-4 text-muted"><i class="fa-solid fa-check-double fa-2x mb-2"></i><br>No homework assigned for this filter.</div>';
                return;
            }

            homeworkData.forEach(hw => {
                // Check if file is attached
                let attachmentHTML = '';
                if (hw.fileName) {
                    attachmentHTML = `
                        <div class="mt-3">
                            <a href="${hw.fileData}" download="${hw.fileName}" class="btn btn-sm btn-outline-info">
                                <i class="fa-solid fa-paperclip"></i> Download Attachment (${hw.fileName})
                            </a>
                        </div>`;
                }

                // Delete button only visible to teachers
                let deleteBtn = currentRole === 'teacher' ? 
                    `<button class="btn btn-sm btn-outline-danger float-end" onclick="deleteHomework(${hw.id})"><i class="fa-solid fa-trash"></i></button>` : '';

                feed.innerHTML += `
                    <div class="hw-card">
                        ${deleteBtn}
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <span class="badge bg-primary fs-6">Class ${hw.className}</span>
                            <h5 class="m-0 text-white fw-bold">${hw.subject}</h5>
                        </div>
                        <p class="text-muted small mb-3">
                            <i class="fa-regular fa-calendar-plus"></i> Assigned: ${hw.dateAssigned} &nbsp;|&nbsp; 
                            <i class="fa-solid fa-triangle-exclamation text-warning"></i> Due: <strong class="text-white">${hw.dueDate}</strong>
                        </p>
                        <p class="m-0" style="color: #e2e8f0; white-space: pre-wrap;">${hw.desc}</p>
                        ${attachmentHTML}
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
